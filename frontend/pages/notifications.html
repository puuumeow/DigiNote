<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiNote | Notifications</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="../index.html" class="logo">DigiNote</a>

      <div class="nav-links">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./notes.html">Notes</a>
        <a href="./upload.html">Upload</a>
        <a href="./my-notes.html">My Notes</a>
        <a href="./profile.html">Profile</a>
        <a href="./bookmarks.html">Bookmarks</a>
        <a href="./notifications.html" class="active">Notifications</a>
        <button id="themeToggle" class="btn btn-outline">🌙</button>
      </div>
    </div>
  </nav>

  <section class="upgraded-page notifications-page">
    <div class="container">
      <button onclick="history.back()" class="btn btn-outline back-btn">← Back</button>

      <div class="notes-hero glass-card premium-card">
        <div>
          <span class="eyebrow">Activity Center</span>
          <h1>Notifications</h1>
          <p class="text-secondary">See follows, comments, upvotes, and purchases related to your notes.</p>
        </div>
        <button id="markAllBtn" class="btn btn-primary">Mark all as read</button>
      </div>

      <div id="notificationSummary" class="glass-card notification-summary"></div>
      <div id="notificationsContainer" class="notification-list modern-notification-list"></div>
    </div>
  </section>

  <script src="../js/utils/api.js"></script>
  <script src="../js/utils/auth.js"></script>
  <script src="../js/components/toast.js"></script>
  <script src="../js/pages/notifications.js"></script>
  <script src="../js/components/theme.js"></script>
</body>
</html>
